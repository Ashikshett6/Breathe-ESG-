# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo, set DJANGO_SECRET_KEY in the dashboard.

databases:
  - name: breathe-db
    plan: free
    databaseName: breathe
    user: breathe

services:
  - type: web
    name: breathe-esg-review
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: breathe-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
